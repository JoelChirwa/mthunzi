name: Deploy Frontend to cPanel

on:
  push:
    branches:
      - main
      - master
      - deployment
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --only=production
        
      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://mthunzitrust.org/api
          NEXT_PUBLIC_BACKEND_URL: https://mthunzitrust.org
          NEXT_PUBLIC_SITE_URL: https://mthunzitrust.org
          NEXT_PUBLIC_APP_URL: https://mthunzitrust.org
          NODE_ENV: production

      - name: Deploy to cPanel via FTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-url: ${{ secrets.FTP_HOST }}
          remote-user: ${{ secrets.FTP_USER }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-path: ./frontend/
          remote-path: /public_html/frontend/
          sftp: false

      - name: Deployment Status
        run: |
          echo "✅ Frontend deployed successfully!"
          echo ""
          echo "Deployment Details:"
          echo "- Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "- Build: Complete"
          echo "- Upload: Complete"
          echo ""
          echo "Your site will be available at: https://mthunzitrust.org"
          echo "Node.js app will restart automatically in cPanel."
